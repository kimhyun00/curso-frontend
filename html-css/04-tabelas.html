<!DOCTYPE html>
<html lang="pt_br">
<head>
	
	<title>HTML - Tabelas</title>
	<meta charset="utf-8">
</head>
<body>
	<h1>Tabelas</h1>

	<table border="2" width="100%">
		<thead>
			<th>Coluna 1</th>
			<th>Coluna 2</th>
			<th>Coluna 3</th>
		</thead>
		<tbody align="center">
			<tr>
				<td>1a</td>
				<td>1b</td>
				<td>1c</td>
			</tr>

			<tr>
				<td>2a</td>
				<td>2b</td>
				<td>2c</td>
			</tr>

			<tr>
				<td>3a</td>
				<td>3b</td>
				<td>3c</td>
			</tr>
		</tbody>
		<tfoot>
			<tr>
				<td align="center" colspan="3">Rodapé da tabela</td>
			</tr>
		</tfoot>
	</table>

	<h2>Tabela com layout</h2>

	<table width="650">
		
		<tr height="90">
			<td colspan="2" align="center" bgcolor="#BBCCEE"> Cabeçalho</td>
		</tr>
		<tr height="400">
			<td width="20"></td>
			<td bgcolor="#DDDDDD">Coluna 1</td>
			<td bgcolor="#EEEEEE">Coluna 2</td>
			<td width="20"></td>
		</tr>
		<tr>
			<td bgcolor="#FF0000" align="center" colspan="4">Rodapé</td>
		</tr>
	</table>

	

</body>
<html>
